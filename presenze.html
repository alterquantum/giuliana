<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Presenze — GestioneCantieri</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#f4f6f9; }
    .nav-link.active { background:rgba(255,255,255,.13)!important;color:#fff!important; }
    .nav-link:hover:not(.active) { background:rgba(255,255,255,.06);color:#ddd!important; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div id="header"></div>
  <main class="flex-grow-1" id="maincol">
    <div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Caricamento…</span></div>
    </div>
  </main>
</div>

<div id="myspinner" class="d-none position-fixed top-0 start-0 w-100 h-100 align-items-center justify-content-center" style="background:rgba(0,0,0,.35);z-index:9999;">
  <div class="spinner-border text-light" role="status"><span class="visually-hidden">Caricamento…</span></div>
</div>
<div class="position-fixed bottom-0 start-50 translate-middle-x mb-4 collapse" id="alert" style="z-index:9000;min-width:320px;">
  <div class="alert alert-danger d-flex align-items-center gap-2 shadow mb-0" id="alertmsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
